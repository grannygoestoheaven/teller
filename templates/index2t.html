<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teller - AI storytelling, Knowledge drifting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Silkscreen&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CRITICAL CSS (above-the-fold) */
        :root {
            --period-color: #888;
        }
        .chat-header {
            text-align: center;
            padding: 1rem;
        }
        .brand {
            font-family: 'Pixelify Sans', serif;
            font-size: 2.5rem;
            margin: 0;
            color: rgba(245, 245, 245, 0.9);
        }
        .toggle-button {
            font-family: 'Silkscreen', cursive;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        .loading-animation {
            display: flex;
            justify-content: center;
            gap: 0.3rem;
            margin: 2rem auto;
        }
        .period {
            color: var(--period-color);
            font-size: 2rem;
            opacity: 0;
            animation: blink 1.4s infinite;
        }
        .period-1 { animation-delay: 0s; }
        .period-2 { animation-delay: 0.2s; }
        .period-3 { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
        }
        .send-button {
            font-family: 'Pixelify Sans', serif;
            background: #555351c2;
            color: rgb(250, 247, 247);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .pixel-play {
            font-family: 'Pixelify Sans', serif;
        }
    </style>
    <!-- Load non-critical CSS asynchronously -->
    <link rel="preload" href="/static/css/style2.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/static/css/style2.css"></noscript>
</head>
<body>
    <header class="chat-header">
        <h1 class="brand" id="teller-title">teller</h1>
    </header>
    <div class="toggle-grid-text" id="toggleGridText">
        <button class="toggle-button" id="toggleBtn">O O O</button>
    </div>
    <div class="toggle-container" id="toggleContainer">
        <div class="grid-container" id="gridContainer"></div>
        <div class="loading-animation-container" id="loadingAnimationContainer">
            <div class="loading-animation" id="loadingAnimation">
                <span id="period1" class="period period-1">.</span>
                <span id="period2" class="period period-2">.</span>
                <span id="period3" class="period period-3">.</span>
            </div>
        </div>
        <div class="chat-history" id="chatHistory">
            <div class="chat-inner" id="story"></div>
        </div>
    </div>
    <div class="audio-player-container" id="audioPlayerContainer">
        <audio id="speechAudio" preload="auto" crossorigin="anonymous"></audio>
        <audio id="backgroundAudio" preload="auto" crossorigin="anonymous" loop></audio>
        <div id="story-title-display" class="story-title-display"></div>
    </div>
    <footer class="chat-input-area">
        <form action="/check_story" method="POST" id="storyForm" enctype="multipart/form-data">
            <div class="form-fields-container">
                <div class="form-group subject-input-group">
                    <input
                      type="text"
                      id="subject"
                      name="subject"
                      placeholder="Let's hear about..."
                      required
                    >
                </div>
            </div>
            <div class="controls">
                <button type="button" class="send-button pixel-play" id="playPauseBtn">Pause</button>
            </div>
        </form>
    </footer>
    <script src="/static/js/AudioStateMachine.js"></script>
    <script type="module" src="/static/js/main2.js"></script>
</body>
</html>
